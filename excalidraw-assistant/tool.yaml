name: excalidraw-assistant
description: Create beautiful Excalidraw diagrams from natural language descriptions. Generates .excalidraw JSON and optionally renders to PNG using visual argument methodology.
version: 1.0.0
entrypoint: excalidraw-assistant.go
usage: |
  Create beautiful Excalidraw diagrams from natural language descriptions.
  It is important that you follow the README.md in the tool directory for full design methodology and best practices.
  And follow its references to ensure alignment of design.
  
  Examples:
    excalidraw-assistant --description "OAuth 2.0 flow" --output auth.excalidraw
    excalidraw-assistant --description "3-tier architecture" --output arch.excalidraw --render
parameters:
  - name: description
    type: string
    description: Natural language description of the diagram to create
    required: true
  - name: output
    type: string
    description: Output file path for .excalidraw JSON
    required: true
  - name: render
    type: boolean
    description: Also generate PNG output using the Python renderer
    required: false
  - name: scale
    type: integer
    description: Render scale factor (default 2)
    required: false
  - name: width
    type: integer
    description: Render viewport width in pixels (default 1920)
    required: false
